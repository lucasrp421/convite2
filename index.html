<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Isabelly - 15 Anos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!--
  ESTRATÉGIA ANTI-FLASH:
  O vídeo fica rodando mudo e invisível (opacity:0, z-index:-1) DESDE O INÍCIO.
  Quando o usuário clica, apenas revelamos o vídeo com fade — sem nenhuma
  troca de display/visibility que cause frame preto.
-->

<!-- TELA 1: Envelope (fica por cima do vídeo que já está rodando atrás) -->
<section id="opening" class="screen active">
    <img src="assets/envelope.png" id="envelope" alt="Convite">
    <p id="tapHint">Clique para abrir o convite</p>
</section>

<!-- TELA 2: Vídeo — sempre no DOM, começa mudo/invisível -->
<section id="videoScreen" class="screen">
    <video id="openingVideo" playsinline webkit-playsinline muted preload="auto">
        <source src="assets/opening.mp4" type="video/mp4">
    </video>
</section>

<!-- TELA 3: Convite principal -->
<section id="inviteScreen" class="screen">
    <div class="invite-wrapper">
        <img src="assets/invite-main.jpg" class="main-invite" alt="Convite">
        <div class="buttons-row">
            <button id="confirmBtn" class="btn-link">
                <img src="assets/btn-confirmar.svg" alt="Confirmar presença">
            </button>
            <button id="localBtn" class="btn-link">
                <img src="assets/btn-local.svg" alt="Local">
            </button>
            <button id="presentBtn" class="btn-link">
                <img src="assets/btn-presentes.svg" alt="Presentes">
            </button>
            <button id="dressBtn" class="btn-link">
                <img src="assets/btn-dress.svg" alt="Dress code">
            </button>
        </div>
    </div>
</section>

<!-- TELA 4: Presentes -->
<section id="presentScreen" class="screen subpage">
    <button class="backBtn" data-back>← Voltar</button>
    <div class="subpage-content">
        <img src="assets/presentes.png" alt="Sugestão de presentes">
    </div>
</section>

<!-- TELA 5: Dress Code -->
<section id="dressScreen" class="screen subpage">
    <button class="backBtn" data-back>← Voltar</button>
    <div class="subpage-content">
        <img src="assets/dress-code.png" alt="Código de vestimenta">
    </div>
</section>

<audio id="bgMusic" src="assets/music.mp3" loop preload="auto"></audio>
<script src="script.js"></script>
</body>
</html>
